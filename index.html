<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>On Show 26 — Map</title>
<style>
  /* ─── Fonts ─────────────────────────────────────────────── */
  @font-face {
    font-family: "Circular Std";
    src: url("fonts/CircularStd-Book.otf") format("opentype");
    font-weight: 400; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: "Circular Std";
    src: url("fonts/CircularStd-Bold.otf") format("opentype");
    font-weight: 700; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: "Circular Std";
    src: url("fonts/CircularStd-Black.otf") format("opentype");
    font-weight: 900; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: "Simplon Mono";
    src: url("fonts/SimplonMono-Regular.otf") format("opentype");
    font-weight: 400; font-style: normal; font-display: swap;
  }

  /* ─── Tokens ────────────────────────────────────────────── */
  :root {
    --pink:      #EC008C;
    --aubergine: #3D0E27;
    --yellow:    #FBF06F;
    --ink:       #000000;
    --paper:     #FFFFFF;
    --rule:      rgba(0,0,0,0.16);
    --muted:     rgba(0,0,0,0.55);

    --sans:  "Circular Std", -apple-system, "Helvetica Neue", Arial, sans-serif;
    --mono:  "Simplon Mono", ui-monospace, "SF Mono", Menlo, monospace;

    --pad: 18px;
  }

  *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #ECECEC;
    font-family: var(--sans);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    overscroll-behavior-y: contain;
  }

  /* ─── Phone container ──────────────────────────────────── */
  .phone {
    width: 100%;
    max-width: 440px;
    min-height: 100vh;
    background: var(--paper);
    position: relative;
    overflow: hidden;
  }
  @media (min-width: 520px) {
    .phone {
      margin: 32px 0;
      min-height: 0;
      box-shadow: 0 24px 60px rgba(0,0,0,0.16);
    }
  }
  .map-body { padding: 18px var(--pad) 64px; }

  /* ─── Icon system ───────────────────────────────────────── */
  .icon { display: inline-block; fill: currentColor; flex: none; }
  .icon svg { display: block; width: 100%; height: 100%; fill: currentColor; }

  /* ───────────────────────────────────────────────────────── */
  /* ─── SPLASH (flat pink + black logo) ───────────────────── */
  /* ───────────────────────────────────────────────────────── */
  .splash {
    position: absolute;
    inset: 0;
    z-index: 50;
    background: var(--pink);
    display: grid;
    place-items: center;
    cursor: pointer;
    will-change: transform;
  }
  .splash.dismissed {
    transform: translateY(-100%);
    transition: transform 700ms cubic-bezier(.7,0,.2,1);
    pointer-events: none;
  }
  .splash .logo {
    width: 56%;
    aspect-ratio: 685 / 962;
    background: url("assets/logo-black.png") center / contain no-repeat;
  }
  .splash .hint {
    position: absolute; left: 0; right: 0; bottom: 22px;
    text-align: center;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.55);
    pointer-events: none;
  }

  /* ───────────────────────────────────────────────────────── */
  /* ─── HEADER ────────────────────────────────────────────── */
  /* ───────────────────────────────────────────────────────── */
  .top-strip {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink);
    padding-bottom: 14px;
    border-bottom: 1px solid var(--ink);
  }
  .top-strip .brand { display: inline-flex; align-items: center; gap: 8px; }
  .top-strip .brand-mark {
    width: 22px; height: 30px;
    background: url("assets/logo-pink.png") center / contain no-repeat;
    display: inline-block;
  }
  .top-strip .when { color: var(--muted); }

  h1.hero {
    font-family: var(--sans);
    font-weight: 900;
    font-size: 52px;
    line-height: 0.88;
    letter-spacing: -0.035em;
    margin: 22px 0 12px;
    color: var(--ink);
    text-wrap: balance;
  }
  .hero-sub {
    font-family: var(--sans);
    font-weight: 400;
    font-size: 15px;
    line-height: 1.35;
    color: var(--ink);
    max-width: 30ch;
    margin: 0 0 20px;
  }
  .hero-sub b { font-weight: 700; }

  /* ─── View toggle (square, IADT-brand) ──────────────────── */
  .view-toggle {
    display: inline-flex;
    border: 1.5px solid var(--ink);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: var(--paper);
  }
  .view-toggle button {
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--ink);
    padding: 10px 16px;
    font: inherit;
    cursor: pointer;
    min-height: 44px;
  }
  .view-toggle button + button { border-left: 1.5px solid var(--ink); }
  .view-toggle button[aria-pressed="true"] { background: var(--ink); color: var(--paper); }

  /* ─── Site plan: full-bleed, top/bottom rules only ──────── */
  .plan {
    margin: 18px calc(var(--pad) * -1) 0;
    border-top: 1px solid var(--ink);
    border-bottom: 1px solid var(--ink);
    background: var(--paper);
  }
  .plan svg { display: block; width: 100%; height: auto; }

  /* SVG plan styles */
  .b-rect       { fill: var(--paper); stroke: var(--ink); stroke-width: 1.5; cursor: pointer; transition: fill 200ms; }
  .b-rect.active{ fill: var(--pink); stroke: var(--ink); }
  .b-label      { font-family: var(--sans); font-weight: 700; font-size: 14px; fill: var(--ink); pointer-events: none; letter-spacing: -0.01em; }
  .b-label.active { fill: var(--paper); }
  .b-sub        { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; fill: var(--muted); pointer-events: none; text-transform: uppercase; }
  .b-sub.active { fill: var(--paper); opacity: 0.9; }
  .annot        { font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em; fill: var(--ink); text-transform: uppercase; }
  .annot.compass { font-size: 15px; font-weight: 700; letter-spacing: 0.12em; }
  .annot.tap-hint { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; fill: var(--muted); }
  .b-plan-id {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    fill: var(--ink);
    pointer-events: none;
  }
  .b-plan-id.active { fill: var(--paper); }
  .courtyard    { fill: rgba(0,0,0,0.04); stroke: var(--ink); stroke-width: 1; stroke-dasharray: 3 3; }
  .pathline     { fill: none; stroke: var(--ink); stroke-width: 1.25; stroke-dasharray: 2 3; }

  /* ─── Search (square) ───────────────────────────────────── */
  .search {
    margin-top: 22px;
    position: relative;
    border: 1.5px solid var(--ink);
    background: var(--paper);
    display: flex;
    align-items: center;
  }
  .search input {
    appearance: none;
    width: 100%;
    border: 0;
    background: transparent;
    font-family: var(--sans);
    font-weight: 400;
    font-size: 15px;
    padding: 14px 16px 14px 46px;
    outline: none;
    color: var(--ink);
    min-height: 48px;
  }
  .search input::placeholder { color: var(--muted); }
  .search .icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    width: 18px; height: 18px; color: var(--ink);
    pointer-events: none;
  }

  /* ─── Chips (square) ────────────────────────────────────── */
  .chips {
    margin-top: 12px;
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .chip {
    appearance: none;
    border: 1.5px solid var(--ink);
    background: var(--paper);
    color: var(--ink);
    padding: 9px 14px;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: -0.005em;
    cursor: pointer;
    min-height: 38px;
    transition: background 150ms, color 150ms, border-color 150ms;
  }
  .chip[aria-selected="true"] {
    background: var(--pink);
    color: var(--paper);
    border-color: var(--pink);
  }

  /* ─── Section heading ───────────────────────────────────── */
  .section-head {
    margin-top: 24px;
    padding-bottom: 12px;
    border-bottom: 1.5px solid var(--ink);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .section-head .label { color: var(--ink); }
  .section-head a {
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid var(--ink);
    padding-bottom: 1px;
    cursor: pointer;
  }
  .empty {
    padding: 32px 6px;
    text-align: center;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ─── Floor + rooms ─────────────────────────────────────── */
  .floors { margin-top: 4px; }
  .floor { border-top: 1px solid var(--rule); padding: 18px 0 6px; }
  .floor:first-child { border-top: 0; padding-top: 16px; }
  .floor-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .floor-num {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: var(--ink);
  }
  /* Square floor-number badge */
  .floor-num .num {
    display: inline-grid;
    place-items: center;
    width: 26px; height: 26px;
    border: 1.5px solid var(--ink);
    font-family: var(--sans);
    font-weight: 700;
    font-size: 13px;
    line-height: 1;
    /* optical: Circular sits slightly above visual centre */
    padding-top: 1px;
  }
  .means {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--ink);
  }
  .means svg { fill: currentColor; display: block; }

  .room {
    display: grid;
    grid-template-columns: 1fr auto;
    column-gap: 16px;
    row-gap: 4px;
    align-items: baseline;
    padding: 14px 0;
    border-top: 1px solid var(--rule);
    cursor: pointer;
  }
  .room:first-of-type { border-top: 0; }
  .room-title {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 17px;
    letter-spacing: -0.015em;
    line-height: 1.1;
    color: var(--ink);
  }
  .room-code {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink);
    text-align: right;
    white-space: nowrap;
    background: rgba(0,0,0,0.05);
    padding: 4px 8px;
  }
  .room-note {
    grid-column: 1 / -1;
    font-family: var(--sans);
    font-weight: 400;
    font-size: 14px;
    line-height: 1.4;
    color: var(--muted);
    margin-top: 2px;
  }
  .room-note b { color: var(--ink); font-weight: 700; }
  .room-where {
    grid-column: 1 / -1;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }
  .room-where b { color: var(--ink); font-weight: 400; }

  /* ─── Footer ────────────────────────────────────────────── */
  footer {
    margin-top: 36px;
    padding-top: 18px;
    border-top: 1px solid var(--ink);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
  }
  footer .replay {
    background: none; border: 0; padding: 0;
    font: inherit; color: var(--ink); cursor: pointer;
    border-bottom: 1px solid var(--ink); padding-bottom: 1px;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

  <div class="map-body" id="body"></div>

<script>
  /* ─────────────────────────────────────────────────────────
     SPLASH (single variant: flat pink + black logo)
     ───────────────────────────────────────────────────────── */
  function showSplash() {
    const el = document.createElement('div');
    el.className = 'splash';
    el.innerHTML = `
      <div class="logo"></div>
      <div class="hint">tap to enter</div>
    `;
    el.addEventListener('click', () => dismissSplash(el));
    document.getElementById('root').appendChild(el);
    setTimeout(() => dismissSplash(el), 1400);
  }
  function dismissSplash(el) {
    if (!el || el.classList.contains('dismissed')) return;
    el.classList.add('dismissed');
    setTimeout(() => el.remove(), 750);
  }

  /* ─────────────────────────────────────────────────────────
     MAP DATA
     ───────────────────────────────────────────────────────── */
  const DATA = {
    quad: {
      label: "Quadrangle",
      sub: "Q wing",
      floors: [
        { num: "1", name: "First floor", access: "stairs",
          rooms: [
            { title: "Art · Paint", code: "QN103", note: "Paint Studio", tags: ["art"] },
          ]
        },
        { num: "G", name: "Ground floor", access: "lift",
          rooms: [
            { title: "Art · Film", code: "TSH", note: "Trevor Scott Hall", tags: ["art","film"] },
            { title: "Art · Sculpture", code: "QW008 · QW005", note: "Sculpture Base + the Cave", tags: ["art"] },
            { title: "Photography + Visual Media", code: "QE006 · QE036 · QE003", note: "", tags: ["photo"] },
            { title: "Film + Television", code: "NFS Studio 1", note: "National Film School", tags: ["film"] },
          ]
        }
      ]
    },
    atrium: {
      label: "Atrium",
      sub: "A wing",
      floors: [
        { num: "G", name: "Ground floor", access: "lift",
          rooms: [
            { title: "Creative Pathways", code: "Foyer", note: "Foyer exhibition", tags: ["design"] },
            { title: "Creative Music Production", code: "A019 · A109", note: "", tags: ["music"] },
            { title: "Immersive Media Production", code: "A016 · A024", note: "<b>Industry event</b> in the Immersive Media Lab", tags: ["immersive"] },
          ]
        }
      ]
    },
    digital: {
      label: "Digital Media",
      sub: "D wing",
      floors: [
        { num: "3", name: "Third floor", access: "lift",
          rooms: [
            { title: "Graphic Design", code: "D304 · D306", note: "", tags: ["design"] },
            { title: "Design for Film", code: "Open space", note: "", tags: ["design","film"] },
          ]
        },
        { num: "2", name: "Second floor", access: "stairs",
          rooms: [
            { title: "Animation", code: "D206 · D208 · D210", note: "", tags: ["animation"] },
            { title: "Design for Film", code: "Open space", note: "", tags: ["design","film"] },
          ]
        },
        { num: "1", name: "First floor", access: "stairs",
          rooms: [
            { title: "Masters Showcase", code: "Open space", note: "", tags: ["design"] },
          ]
        }
      ]
    }
  };

  const DISCIPLINES = [
    { id: "all",       label: "All" },
    { id: "animation", label: "Animation" },
    { id: "art",       label: "Art" },
    { id: "design",    label: "Design" },
    { id: "film",      label: "Film" },
    { id: "photo",     label: "Photo" },
    { id: "music",     label: "Music" },
    { id: "immersive", label: "Immersive" },
  ];

  /* ─── State ─────────────────────────────────────────────── */
  let active = "quad";
  let showPlan = true;
  let query = "";
  let filter = "all";

  /* ─── Helpers ───────────────────────────────────────────── */
  function accessSvg(access) {
    if (access === "lift") {
      return `<svg viewBox="0 0 29.05 60.36" style="width:14px;height:30px;flex-shrink:0" aria-hidden="true"><use href="#i-lift"/></svg>`;
    }
    return `<svg viewBox="0 0 61.34 43.12" style="width:28px;height:20px;flex-shrink:0" aria-hidden="true"><use href="#i-stairs"/></svg>`;
  }

  /* ─── Site plan SVG ─────────────────────────────────────── */
  function plan() {
    const a = (id) => active === id ? " active" : "";
    const BX = 50;
    const BW = 300;
    const BH = 110;
    const GAP = 48;
    const Y0 = 52;
    const yDmb = Y0;
    const yAtrium = yDmb + BH + GAP;
    const yQuad = yAtrium + BH + GAP;
    const hQuad = 248;
    const cy = yQuad + 88;
    const ch = 128;
    return `
      <svg viewBox="0 0 400 672" xmlns="http://www.w3.org/2000/svg" aria-label="Site plan">
        <text x="22" y="34" class="annot compass">↑ N</text>
        <text x="378" y="34" class="annot tap-hint" text-anchor="end">TAP A BUILDING</text>

        <g data-key="digital">
          <rect class="b-rect${a("digital")}" x="${BX}" y="${yDmb}" width="${BW}" height="${BH}"/>
          <text class="b-plan-id${a("digital")}" x="62" y="${yDmb + 22}">DMB</text>
        </g>

        <g data-key="atrium">
          <rect class="b-rect${a("atrium")}" x="${BX}" y="${yAtrium}" width="${BW}" height="${BH}"/>
          <text class="b-plan-id${a("atrium")}" x="62" y="${yAtrium + 22}">ATRIUM</text>
        </g>

        <g data-key="quad">
          <rect class="b-rect${a("quad")}" x="${BX}" y="${yQuad}" width="${BW}" height="${hQuad}"/>
          <text class="b-plan-id${a("quad")}" x="62" y="${yQuad + 22}">QUAD</text>
        </g>

        <rect class="courtyard" x="66"  y="${cy}" width="128" height="${ch}"/>
        <text x="130" y="${cy + ch * 0.55}" class="annot" text-anchor="middle">COURTYARD</text>
        <rect class="courtyard" x="206" y="${cy}" width="128" height="${ch}"/>
        <text x="270" y="${cy + ch * 0.55}" class="annot" text-anchor="middle">COURTYARD</text>

        <g data-key="quad">
          <rect class="b-rect${a("quad")}" x="262" y="${yQuad}" width="86" height="30"/>
          <text class="b-sub${a("quad")}" x="272" y="${yQuad + 12}" style="font-size:7px">NFS</text>
          <text class="b-label${a("quad")}" x="272" y="${yQuad + 26}" style="font-size:9px">FILM SCHOOL</text>
        </g>

        <text x="392" y="210" class="annot" transform="rotate(90 392 210)" text-anchor="start" style="font-size:10px;font-weight:700;letter-spacing:0.16em">KEELE AVE ENTRANCE</text>
        <path class="pathline" d="M 350 ${yAtrium + BH * 0.5} L 392 210"/>
      </svg>
    `;
  }

  /* ─── Filters ───────────────────────────────────────────── */
  function isFiltering() {
    return filter !== "all" || query.trim().length > 0;
  }
  function roomMatches(r) {
    if (filter !== "all" && !(r.tags || []).includes(filter)) return false;
    const q = query.trim().toLowerCase();
    if (!q) return true;
    return (
      r.title.toLowerCase().includes(q) ||
      r.code.toLowerCase().includes(q) ||
      (r.note || "").toLowerCase().includes(q) ||
      (r.tags || []).some(t => t.includes(q))
    );
  }
  function filteredResults() {
    const out = [];
    for (const [key, b] of Object.entries(DATA)) {
      for (const f of b.floors) {
        for (const r of f.rooms) {
          if (roomMatches(r)) out.push({
            ...r, building: b.label, sub: b.sub, floor: f.num, floorName: f.name, key
          });
        }
      }
    }
    return out;
  }

  /* ─── Rendering ─────────────────────────────────────────── */
  function renderBuilding(b) {
    return `
      <div class="floors">
        ${b.floors.map(f => `
          <section class="floor">
            <div class="floor-head">
              <span class="floor-num">
                <span class="num">${f.num}</span>
                <span>${f.name}</span>
              </span>
              <span style="display:inline-flex;align-items:center;gap:8px">
                <span class="means" style="color:var(--ink)" aria-label="${f.access}">
                  ${accessSvg(f.access)}
                </span>
                <span>${b.sub}</span>
              </span>
            </div>
            ${f.rooms.map(r => `
              <div class="room">
                <div class="room-title">${r.title}</div>
                <div class="room-code">${r.code}</div>
                ${r.note ? `<div class="room-note">${r.note}</div>` : ''}
              </div>
            `).join('')}
          </section>
        `).join('')}
      </div>
    `;
  }

  function renderResults() {
    const results = filteredResults();
    const label = filter === "all"
      ? "All disciplines"
      : (DISCIPLINES.find(d => d.id === filter) || {}).label || filter;
    return `
      <div class="section-head">
        <span><span class="label">${results.length}</span> result${results.length === 1 ? '' : 's'} · ${label}${query ? ` · "${query}"` : ''}</span>
        <a data-clear>Clear</a>
      </div>
      ${results.length === 0 ? `<div class="empty">No rooms match.</div>` : `
        <div class="floors">
          ${results.map(r => `
            <div class="room">
              <div class="room-title">${r.title}</div>
              <div class="room-code">${r.code}</div>
              <div class="room-where"><b>${r.building}</b> · Floor ${r.floor}</div>
              ${r.note ? `<div class="room-note">${r.note}</div>` : ''}
            </div>
          `).join('')}
        </div>
      `}
    `;
  }

  function render() {
    const b = DATA[active];
    const body = document.getElementById('body');
    body.innerHTML = `
      <div class="top-strip">
        <span class="brand"><span class="brand-mark" aria-hidden="true"></span>On Show 26</span>
        <span class="when">Thu 28 May · 17:30</span>
      </div>

      <h1 class="hero">Find your<br/>way around.</h1>
      <p class="hero-sub">A window into the future of the creative industry. <b>Three buildings, one evening.</b></p>

      <div class="view-toggle" role="group" aria-label="View">
        <button data-view="plan" aria-pressed="${showPlan}">Site plan</button>
        <button data-view="list" aria-pressed="${!showPlan}">List only</button>
      </div>

      <div class="plan ${showPlan ? '' : 'hidden'}">
        ${plan()}
      </div>

      <div class="search">
        <span class="icon">
          <svg viewBox="0 0 48.55 48.55" style="width:100%;height:100%;fill:currentColor">
            <use href="#i-search"/>
          </svg>
        </span>
        <input id="q" type="text" placeholder="Search rooms or disciplines" value="${query.replace(/"/g,'&quot;')}" />
      </div>

      <div class="chips" role="tablist">
        ${DISCIPLINES.map(d => `
          <button class="chip" role="tab" aria-selected="${filter === d.id}" data-chip="${d.id}">${d.label}</button>
        `).join('')}
      </div>

      ${isFiltering() ? renderResults() : `
        <div class="section-head">
          <span><span class="label">${b.label}</span> · ${b.sub}</span>
          <span>${b.floors.length} floor${b.floors.length === 1 ? '' : 's'}</span>
        </div>
        ${renderBuilding(b)}
      `}

      <footer>
        <span>onshow.iadt.ie</span>
        <button class="replay" data-replay>Replay intro</button>
      </footer>
    `;

    /* event bindings */
    const qInput = body.querySelector('#q');
    if (qInput) {
      qInput.addEventListener('input', (e) => {
        query = e.target.value;
        render();
        requestAnimationFrame(() => {
          const el = document.getElementById('q');
          if (el) { el.focus(); el.setSelectionRange(query.length, query.length); }
        });
      });
    }
    body.querySelectorAll('[data-chip]').forEach(c => {
      c.addEventListener('click', () => { filter = c.dataset.chip; render(); });
    });
    body.querySelectorAll('[data-view]').forEach(t => {
      t.addEventListener('click', () => {
        showPlan = t.dataset.view === 'plan';
        render();
      });
    });
    body.querySelectorAll('svg [data-key]').forEach(g => {
      g.addEventListener('click', () => {
        active = g.dataset.key;
        filter = 'all'; query = '';
        render();
      });
    });
    const clear = body.querySelector('[data-clear]');
    if (clear) clear.addEventListener('click', () => { query = ''; filter = 'all'; render(); });
    const replay = body.querySelector('[data-replay]');
    if (replay) replay.addEventListener('click', () => showSplash());
  }

  /* ─── Init ──────────────────────────────────────────────── */
  showSplash();
  render();
</script>
</body>
</html>
